<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#667eea" />

    <title>GeoGuessr Trainer — Learn countries, flags & capitals</title>
    <meta
      name="description"
      content="A free, fast quiz to practice identifying countries by flag or map location, and learning world capitals. Great for GeoGuessr training."
    />

    <!-- Open Graph / social -->
    <meta property="og:title" content="GeoGuessr Trainer" />
    <meta
      property="og:description"
      content="Practice countries, flags, and capitals — free, no signup."
    />
    <meta property="og:type" content="website" />

    <!-- Emoji-based SVG favicon — no asset file needed -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E"
    />

    <!-- Typography: Inter for UI, Fraunces for editorial headings/country names -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />

    <!-- Apply saved theme before paint to avoid flash of wrong colors -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('ggt-theme');
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (sysDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
