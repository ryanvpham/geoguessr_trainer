<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#667eea" />

    <!--
      Per-route title, description, canonical and Open Graph/Twitter tags are
      injected by src/seo/Seo.jsx (via vite-react-ssg). Only site-wide metadata
      that doesn't vary per page lives here, so titles aren't duplicated.
    -->
    <meta property="og:site_name" content="GeoGuessr Trainer" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "GeoGuessr Trainer",
        "url": "https://geo-quizzes.com/",
        "description": "Free quizzes to practice country flags, world capitals, and states & provinces on the map — built for GeoGuessr training.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web browser",
        "browserRequirements": "Requires JavaScript",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is GeoGuessr Trainer free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Every quiz is free, with no signup, no ads, and no tracking."
            }
          },
          {
            "@type": "Question",
            "name": "What can I practice?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Identifying countries by their flag or map location, naming world capitals, and naming states, provinces and their capitals."
            }
          },
          {
            "@type": "Question",
            "name": "Which countries' states and provinces are included?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The states & provinces quiz covers the US, Canada, Mexico, Brazil, Argentina, Australia, India, Indonesia, Malaysia, the Philippines, Nigeria and South Africa."
            }
          },
          {
            "@type": "Question",
            "name": "Does it help with GeoGuessr?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — it drills the flags, capitals and regional geography that help you place locations faster in GeoGuessr."
            }
          }
        ]
      }
    </script>

    <!-- Emoji-based SVG favicon — no asset file needed -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E"
    />

    <!-- Typography: Inter for UI, Fraunces for editorial headings/country names -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />

    <!-- Apply saved theme before paint to avoid flash of wrong colors -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('ggt-theme');
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (sysDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
